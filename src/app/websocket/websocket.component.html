<p>This WebSocket study was developed using Cloud Run, Docker, Angular, TypeScript, Spring, Java, and STOMP.</p>
<br />
<input type="text" placeholder="room name" [field]="websocketForm.roomId" /><br />
<button [disabled]="connecting || !websocketForm.roomId().value()" (click)="connect()">CONNECT</button><br />
<textarea #message>Hello, websocket!</textarea><br />
<button [disabled]="connecting || !stompSignal()" (click)="sendMessage(message.value)">SEND MESSAGE</button><br />
@for (message of messages; track message) {
  <p class="chat-message">{{message}}</p>
}
<button [disabled]="connecting || !stompSignal()" (click)="disconnect()">DISCONNECT</button><br />
@if (connecting) {
  <p>Connecting...</p>
}
