<input
    type="range" 
    min="1" 
    max="100" 
    value="60"
    #mySlider
    (input)="rotationUpdate(mySlider.value)" />

<input
    type="range" 
    min="1" 
    max="135" 
    value="75"
    #myZoomSlider
    (input)="zoomUpdate(myZoomSlider.value)" />

<br />

<canvas #canvas id="canvas" style="width: 800px; height:450px;"></canvas>
