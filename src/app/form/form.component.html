<app-welcome></app-welcome>
<app-user-intake
    [(securityFormGroup)]="securityForm"
></app-user-intake>
<app-security-intake
    [(securityFormGroup)]="securityForm"
></app-security-intake>
<app-confirmation></app-confirmation>

<!-- two form groups for each part of the form -->

<form [formGroup]="securityForm" (ngSubmit)="onSubmit()">
  <button type="submit" [disabled]="!securityForm.valid">Submit</button>
</form>

<p>Value: {{ securityForm.valueChanges | async | json }}</p>
