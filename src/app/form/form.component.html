<app-welcome *ngIf="currentStep === 1"></app-welcome>
<app-user-intake
  *ngIf="currentStep === 2"
  [(securityFormGroup)]="securityForm"
></app-user-intake>
<app-security-intake
  *ngIf="currentStep === 3"
  [(securityFormGroup)]="securityForm"
></app-security-intake>
<app-confirmation
  *ngIf="currentStep === 4"
></app-confirmation>

<button (click)="previous()">PREVIOUS</button>
<button (click)="next()">NEXT</button>

<p>Value: {{ securityForm.valueChanges | async | json }}</p>
